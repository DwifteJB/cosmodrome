name: cosmodrome
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  forui: ^0.21.1
  crypto: ^3.0.7
  http: ^1.2.0
  provider: ^6.1.5+1
  go_router: ^17.2.1
  skeletonizer: ^2.1.0+1
  flutter_secure_storage: ^10.0.0
  gradient_blur: ^1.0.2+1
  palette_generator: ^0.3.3

  # desktop only
  tray_manager: ^0.5.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: "Inter"
      fonts:
        - asset: fonts/Inter.ttf
        - asset: fonts/Inter-Italic.ttf
          style: italic