name: Build Linux and Android

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            # build docker image 
            - name: Build and export Docker image
              uses: docker/build-push-action@v6
              with:
                context: .
                target: export
                outputs: type=local,dest=./output
                cache-from: type=gha
                cache-to: type=gha,mode=max

            # upload cosmodrome_installer, and app.zip as artifacts
            - name: Upload Linux artifacts
              uses: actions/upload-artifact@v6
              with:
                name: cosmodrome-linux
                path: |
                    output/cosmodrome_installer
                    output/app.zip
            # upload app-android.zip
            - name: Upload Android artifact
              uses: actions/upload-artifact@v6
              with:
                name: cosmodrome-android
                path: output/app-android.zip
