name: Build Linux and Android

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            # build docker image with docker build --target export --output ./output .
            - name: Build and export Docker image
              run: |
                docker build --target export --output ./output .

            # upload cosmodrome_installer, and app.zip as artifacts
            - name: Upload Linux artifacts
              uses: actions/upload-artifact@v6
              with:
                name: cosmodrome-linux
                path: |
                    output/cosmodrome_installer
                    output/app-android.zip
            # upload app-android.zip
            - name: Upload Android artifact
              uses: actions/upload-artifact@v6
              with:
                name: cosmodrome-android
