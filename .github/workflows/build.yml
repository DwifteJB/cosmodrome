name: Build Linux, Windows & Android.

on:
    workflow_dispatch:
    push:
        branches: [main]
        # all paths that would probably be triggered by a change for a new build
        paths:
            - 'lib/**'
            - 'assets/**'
            - 'pubspec.yaml'
            - 'linux/**'
            - 'android/**'
            - '.github/workflows/build.yml'
            - 'discord-rpc/**'
            - 'installer/**'
            - 'windows/**'
    pull_request:
        branches: [main]

jobs:
    build-linux:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true

            - uses: actions/setup-go@v5
              with:
                  go-version-file: discord-rpc/go.mod
                  cache-dependency-path: |
                      discord-rpc/go.sum
                      installer/go.sum

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -yq --no-install-recommends \
                    clang cmake ninja-build pkg-config \
                    libgtk-3-dev liblzma-dev libstdc++-12-dev \
                    libsecret-1-dev libayatana-appindicator3-dev \
                    libxxf86vm-dev lld

            - run: flutter pub get

            - run: flutter build linux --release

            - name: Build Discord RPC
              working-directory: discord-rpc
              run: go build -o ../build/linux/x64/release/bundle/cosmodrome-rpc main.go

            - name: Install fyne
              run: go install fyne.io/tools/cmd/fyne@latest

            - name: Zip Linux bundle
              run: |
                  cd build/linux/x64/release/bundle
                  zip -r $GITHUB_WORKSPACE/app.zip .
                  cp $GITHUB_WORKSPACE/app.zip $GITHUB_WORKSPACE/installer/app.zip

            - name: Build installer
              working-directory: installer
              run: |
                  fyne package -os linux -icon ./assets/logo.png
                  tar -xf cosmodrome_installer.tar.xz -C $GITHUB_WORKSPACE --strip-components=1
                  mv $GITHUB_WORKSPACE/local/bin/cosmodrome_installer $GITHUB_WORKSPACE/cosmodrome_installer

            - uses: actions/upload-artifact@v4
              with:
                  name: cosmodrome-linux
                  path: |
                      cosmodrome_installer
                      app.zip

    build-android:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: temurin

            - uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true

            - name: Accept Android licenses
              run: yes | flutter doctor --android-licenses || true

            - run: flutter pub get

            - run: flutter build apk --release

            - name: Zip Android APK
              run: zip -j app-android.zip build/app/outputs/flutter-apk/app-release.apk

            - uses: actions/upload-artifact@v4
              with:
                  name: cosmodrome-android
                  path: app-android.zip

    build-windows:
      permissions:
        contents: read
      runs-on: windows-latest
      steps:
        - uses: actions/checkout@v6
        # install flutter
    
        - uses: subosito/flutter-action@v2
          with:
              channel: stable
              cache: true

        # install golang
        - uses: actions/setup-go@v6
          with:
            go-version-file: discord-rpc/go.mod
            cache-dependency-path: |
              discord-rpc/go.sum
              installer/go.sum
            cache: true
        # install dependencies needed for fyne (cgo)
        - name: Install Window build dependencies
          run: |
            winget install -e --id MSYS2.MSYS2 --source winget --accept-package-agreements --accept-source-agreements --silent          
            echo "::add-path::C:\msys64\usr\bin"
            go install fyne.io/tools/cmd/fyne@latest
        
        - name: Install Flutter dependencies
          run: flutter pub get

        - name: Build Windows bundle
          run: flutter build windows --release

        - name: Build Discord RPC
          working-directory: discord-rpc
          run: go build -o ../build/windows/x64/release/bundle/cosmodrome-rpc main.go
        - name: Zip Windows bundle
          run: |
            cd build/windows/x64/release/bundle
            powershell Compress-Archive -Path * -DestinationPath ..\..\..\..\installer\app.zip
          
        - name: Build installer
          working-directory: installer
          run: |
            fyne package -os windows -icon .\assets\logo.png -app-id me.rmfosho.cosmodromeinstaller

        - name: Upload installer artifact
          uses: actions/upload-artifact@v4
          with:
            name: cosmodrome-windows-installer
            path: installer/cosmodrome-windows-installer.exe
        
        - name: Upload app.zip
          uses: actions/upload-artifact@v4
          with:
            name: cosmodrome-windows-zip
            path: installer/app.zip